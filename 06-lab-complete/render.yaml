services:
  - type: web
    name: production-agent
    runtime: docker
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: AGENT_API_KEY
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: redis-cache
          property: connectionString

  - type: redis
    name: redis-cache
    plan: free
    ipAllowList: [] # Only allow internal access
